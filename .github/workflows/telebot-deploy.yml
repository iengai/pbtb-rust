name: telebot-deploy

# Deploy an image already in ECR onto the NAT/EC2 host via SSM.
# No build, no Terraform, no NAT replacement — just (re-tag +) restart.
# Manual trigger so deploying to the trading-adjacent host is always deliberate.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'ECR image tag to deploy (a git SHA, or "latest")'
        default: 'latest'

permissions:
  id-token: write   # OIDC -> assume the AWS deploy role
  contents: read

env:
  AWS_REGION: ap-northeast-1
  ECR_REPO: scalable-cluster-dev-telebot

jobs:
  deploy:
    # No compilation here -> cheapest standard runner is fine.
    runs-on: ubuntu-latest
    # Optional approval gate: configure required reviewers on this environment.
    environment: production
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # The NAT's systemd unit always pulls :latest. To deploy a specific tag
      # (e.g. roll back to an older SHA), re-point :latest at it in ECR first.
      - name: Point :latest at the requested tag
        if: ${{ github.event.inputs.tag != 'latest' }}
        run: |
          set -euo pipefail
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "$ECR_REPO" \
            --image-ids imageTag=${{ github.event.inputs.tag }} \
            --query 'images[0].imageManifest' --output text)
          if [ -z "$MANIFEST" ] || [ "$MANIFEST" = "None" ]; then
            echo "Tag ${{ github.event.inputs.tag }} not found in $ECR_REPO"; exit 1
          fi
          aws ecr put-image \
            --repository-name "$ECR_REPO" \
            --image-tag latest \
            --image-manifest "$MANIFEST" >/dev/null
          echo "Re-pointed :latest -> ${{ github.event.inputs.tag }}"

      - name: Restart telebot on the NAT via SSM
        run: |
          set -euo pipefail
          NAT_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=nat-instance" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          [ -n "$NAT_ID" ] || { echo "NAT instance not found"; exit 1; }
          echo "NAT instance: $NAT_ID"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$NAT_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy telebot ${{ github.event.inputs.tag }}" \
            --parameters 'commands=["set -e","systemctl restart telebot","ok=0; for i in $(seq 1 12); do sleep 5; if docker ps --filter name=telebot --filter status=running | grep -q telebot; then ok=1; break; fi; done","if [ $ok -ne 1 ]; then echo telebot-not-running; systemctl --no-pager --lines=30 status telebot || true; docker logs --tail 50 telebot 2>&1 || true; exit 1; fi","echo telebot-up"]' \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $CMD_ID"

          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$NAT_ID" || true
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$NAT_ID" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json

          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$NAT_ID" \
            --query 'Status' --output text)
          [ "$STATUS" = "Success" ] || { echo "Deploy SSM status: $STATUS"; exit 1; }
